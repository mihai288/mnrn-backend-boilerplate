services:
  mongo:
    image: mongo:7
    container_name: mongo-dev
    restart: always
    ports:
      - '27017:27017'
    volumes:
      - mongo_data:/data/db

  backend:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: autominutes-backend
    restart: always
    ports:
      - '3000:3000'
    environment:
      PORT: 3000
      MONGO_URI: mongodb://mongo:27017/autominutes
      JWT_SECRET: dev-secret
    depends_on:
      - mongo

volumes:
  mongo_data:
